# ═══════════════════════════════════════════════════════════════════════════════
# PRODUCTION — Stack complète (infra + API + Web)
# ═══════════════════════════════════════════════════════════════════════════════
# Prérequis : .env.prod (copier .env.prod.example → .env.prod, NE PAS commiter)
# Démarrage : make prod
# ───────────────────────────────────────────────────────────────────────────────
# Différences vs staging :
#   • DATABASE_URL passée directement (peut pointer vers un DB externe : Supabase, RDS…)
#   • Ports DB/Redis/MinIO NON exposés à l'extérieur
#   • Secrets injectés via variables d'environnement (CI/CD → .env.prod)
#   • restart: always
# ───────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  # Retirer ce service si vous utilisez une base externe (Supabase, RDS, etc.)
  postgres:
    container_name: ivod-postgres
    image: postgres:15-alpine
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-ivod}
      POSTGRES_USER:     ${POSTGRES_USER:-ivod}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    # Pas de port exposé en prod — accessible uniquement dans le réseau Docker
    volumes:
      - prod_postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ivod} -d ${POSTGRES_DB:-ivod}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    container_name: ivod-redis
    image: redis:7-alpine
    command: >
      sh -c "redis-server ${REDIS_PASSWORD:+--requirepass $$REDIS_PASSWORD}"
    # Pas de port exposé en prod
    volumes:
      - prod_redis_data:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO ───────────────────────────────────────────────────────────────────
  minio:
    container_name: ivod-minio
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"   # Uniquement en loopback — derrière reverse proxy
      - "127.0.0.1:9001:9001"   # Console MinIO (accès admin uniquement)
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      MINIO_API_CORS_ALLOW_ORIGIN: "${FRONTEND_URL}"
    volumes:
      - prod_minio_data:/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "mc ready local 2>/dev/null || curl -sf http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── MinIO Init ──────────────────────────────────────────────────────────────
  minio_init:
    container_name: ivod-minio-init
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      mc mb -p local/$$MINIO_BUCKET >/dev/null 2>&1 || true;
      mc anonymous set download local/$$MINIO_BUCKET >/dev/null 2>&1 || true;
      echo 'MinIO bucket [$$MINIO_BUCKET] ready';
      "
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET:        ${MINIO_BUCKET:-ivod}
    restart: "no"

  # ── API NestJS ──────────────────────────────────────────────────────────────
  api:
    container_name: ivod-api
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: runner
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio_init:
        condition: service_completed_successfully
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
      PORT: 3000
      # Si DATABASE_URL est défini dans .env.prod, il prend la priorité (DB externe)
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-ivod}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ivod}}
      REDIS_URL:    ${REDIS_URL:-redis://${REDIS_PASSWORD:+:${REDIS_PASSWORD}@}redis:6379}
      MINIO_ENDPOINT:         http://minio:9000
      MINIO_PRESIGN_ENDPOINT: ${MINIO_PRESIGN_ENDPOINT:?MINIO_PRESIGN_ENDPOINT required (URL publique MinIO)}
      MINIO_PUBLIC_BASE_URL:  ${MINIO_PUBLIC_BASE_URL:?MINIO_PUBLIC_BASE_URL required}
      MINIO_ACCESS_KEY:       ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY:       ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET:           ${MINIO_BUCKET:-ivod}
      VIDEO_UPLOAD_PROVIDER:  minio
      FRONTEND_URL:           ${FRONTEND_URL:?FRONTEND_URL required}
      API_PUBLIC_URL:         ${API_PUBLIC_URL:?API_PUBLIC_URL required}
      HLS_PLAYBACK_MODE:      proxy
    command: >
      sh -c "
        npx prisma migrate deploy &&
        npm run prisma:seed:all &&
        node dist/main
      "
    ports:
      - "127.0.0.1:${API_PORT:-3000}:3000"   # Loopback uniquement — derrière reverse proxy
    volumes:
      - ./logs/api:/var/log/ivod
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('net').connect(3000,'127.0.0.1',()=>process.exit(0)).on('error',()=>process.exit(1));\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ── Web Next.js ─────────────────────────────────────────────────────────────
  web:
    container_name: ivod-web
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL required (ex: https://api.ivod.ci/api/v1)}"
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: 3001
      HOSTNAME: 0.0.0.0
      API_INTERNAL_URL: http://api:3000/api/v1
    ports:
      - "127.0.0.1:${WEB_PORT:-3001}:3001"   # Loopback uniquement — derrière reverse proxy
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('net').connect(3001,'127.0.0.1',()=>process.exit(0)).on('error',()=>process.exit(1));\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  prod_postgres_data:
  prod_redis_data:
  prod_minio_data:
