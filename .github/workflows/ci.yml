# =============================================================================
# CI — Intégration continue iVOD
#
# Lint et build des applications (api, web, mobile).
# Sur push vers main : déclenche également le CD via deploy.yml.
#
# Chaque app est buildée dans son propre répertoire avec son gestionnaire
# de paquets (pnpm pour api/mobile, npm pour web).
# =============================================================================

name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop, main]

jobs:
  changes:
    name: Détection des changements
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
      mobile: ${{ steps.filter.outputs.mobile }}
      ops: ${{ steps.filter.outputs.ops }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
            web:
              - 'apps/web/**'
            mobile:
              - 'apps/mobile/**'
            ops:
              - 'deploy.sh'
              - 'scripts/**'
              - 'Makefile'
              - '.github/workflows/**'

  api:
    name: API — lint & build
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/api/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: apps/api
      - run: pnpm run lint
        working-directory: apps/api
      - run: pnpm run build
        working-directory: apps/api

  web:
    name: Web — lint & build
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
        working-directory: apps/web
      - run: npm run lint
        working-directory: apps/web
      - run: npm run build
        working-directory: apps/web

  mobile:
    name: Mobile — lint
    needs: changes
    if: needs.changes.outputs.mobile == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/mobile/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: apps/mobile
      - run: pnpm run lint
        working-directory: apps/mobile

  docker-api:
    name: API — push image GHCR
    needs: [changes, api]
    if: github.event_name == 'push' && needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: apps/api
          target: production
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/api:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}/api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: CD — déploiement production
    needs: [changes, api, web]
    if: |
      github.event_name == 'push' && github.ref == 'refs/heads/main' &&
      (needs.changes.outputs.api == 'true' || needs.changes.outputs.web == 'true' || needs.changes.outputs.ops == 'true') &&
      (needs.api.result == 'success' || needs.api.result == 'skipped') &&
      (needs.web.result == 'success' || needs.web.result == 'skipped')
    uses: ./.github/workflows/deploy.yml
    secrets: inherit

  eas-update:
    name: Mobile — mise à jour OTA
    needs: [changes, mobile]
    if: |
      github.event_name == 'push' &&
      needs.changes.outputs.mobile == 'true' &&
      needs.mobile.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/mobile/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: apps/mobile
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Publier sur Expo
        working-directory: apps/mobile
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          BRANCH="preview"
          [ "$REF_NAME" = "main" ] && BRANCH="production"
          eas update --branch "$BRANCH" --message "$COMMIT_MSG" --non-interactive
