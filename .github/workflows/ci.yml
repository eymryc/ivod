# =============================================================================
# CI — Intégration continue iVOD
#
# Lint et build des applications (api, web, mobile).
# Sur push vers main : déclenche également le CD via deploy.yml.
#
# Chaque app est buildée dans son propre répertoire avec son gestionnaire
# de paquets (pnpm pour api/mobile, npm pour web).
#
# ── Sécurité automatisée ──────────────────────────────────────────────────
# secrets-scan  : BLOQUANT — un secret détecté dans l'historique Git empêche
#                 le déploiement (deploy.yml). Vérifié sans faux positif sur
#                 les 5 commits actuels avant mise en place (2026-07-03).
# dependency-audit, sast-scan, container-scan : RAPPORT SEUL (non-bloquants)
#                 — l'API a aujourd'hui 9 vulnérabilités "high" préexistantes
#                 (dépendances de dev/test, ex: multer, form-data via
#                 @types/supertest) et l'analyse statique 24 pistes à trier
#                 (essentiellement path.join sur des IDs internes dans le
#                 pipeline vidéo). Bloquer dessus dès aujourd'hui casserait
#                 la CI sans lien avec le code qu'on modifie réellement.
#                 À faire évoluer vers bloquant une fois le backlog trié.
# =============================================================================

name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop, main]

jobs:
  changes:
    name: Détection des changements
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
      mobile: ${{ steps.filter.outputs.mobile }}
      ops: ${{ steps.filter.outputs.ops }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
            web:
              - 'apps/web/**'
            mobile:
              - 'apps/mobile/**'
            ops:
              - 'deploy.sh'
              - 'scripts/**'
              - 'Makefile'
              - '.github/workflows/**'

  api:
    name: API — lint & build
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/api/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: apps/api
      - run: pnpm run lint
        working-directory: apps/api
      - run: pnpm run build
        working-directory: apps/api

  web:
    name: Web — lint & build
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
        working-directory: apps/web
      - run: npm run lint
        working-directory: apps/web
      - run: npm run build
        working-directory: apps/web

  mobile:
    name: Mobile — lint
    needs: changes
    if: needs.changes.outputs.mobile == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/mobile/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: apps/mobile
      - run: pnpm run lint
        working-directory: apps/mobile

  secrets-scan:
    name: Sécurité — secrets exposés (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # historique complet — un clone superficiel ne scannerait que le dernier commit
      - name: Installer gitleaks (dernière version publiée)
        run: |
          set -euo pipefail
          TAG="$(curl -sSL https://api.github.com/repos/gitleaks/gitleaks/releases/latest | grep -m1 '"tag_name"' | cut -d '"' -f4)"
          VERSION="${TAG#v}"
          curl -sSL -o gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/${TAG}/gitleaks_${VERSION}_linux_x64.tar.gz"
          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/
          gitleaks version
      - name: Scanner l'historique Git (bloquant)
        run: gitleaks detect --source . --redact --exit-code 1

  dependency-audit:
    name: Sécurité — dépendances vulnérables (rapport)
    needs: changes
    if: needs.changes.outputs.api == 'true' || needs.changes.outputs.web == 'true' || needs.changes.outputs.mobile == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: Audit API (pnpm)
        if: needs.changes.outputs.api == 'true'
        working-directory: apps/api
        run: |
          pnpm install --frozen-lockfile
          pnpm audit --audit-level high || true
      - name: Audit Web (npm)
        if: needs.changes.outputs.web == 'true'
        working-directory: apps/web
        run: |
          npm ci
          npm audit --audit-level high || true
      - name: Audit Mobile (pnpm)
        if: needs.changes.outputs.mobile == 'true'
        working-directory: apps/mobile
        run: |
          pnpm install --frozen-lockfile
          pnpm audit --audit-level high || true

  sast-scan:
    name: Sécurité — analyse statique (rapport)
    needs: changes
    if: needs.changes.outputs.api == 'true' || needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install semgrep
      - name: Analyser api + web
        run: semgrep --config auto --error apps/api/src apps/web/lib apps/web/app || true

  docker-api:
    name: API — push image GHCR
    needs: [changes, api]
    if: github.event_name == 'push' && needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: apps/api
          target: production
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/api:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}/api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  container-scan:
    name: Sécurité — image Docker (rapport)
    needs: [changes, docker-api]
    if: github.event_name == 'push' && needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ghcr.io/${{ github.repository }}/api:${{ github.sha }}
          severity: "CRITICAL,HIGH"
          exit-code: "0" # rapport seul — voir note en tête de fichier

  deploy:
    name: CD — déploiement production
    needs: [changes, api, web, secrets-scan]
    if: |
      github.event_name == 'push' && github.ref == 'refs/heads/main' &&
      (needs.changes.outputs.api == 'true' || needs.changes.outputs.web == 'true' || needs.changes.outputs.ops == 'true') &&
      (needs.api.result == 'success' || needs.api.result == 'skipped') &&
      (needs.web.result == 'success' || needs.web.result == 'skipped') &&
      needs['secrets-scan'].result == 'success'
    uses: ./.github/workflows/deploy.yml
    secrets: inherit

  eas-update:
    name: Mobile — mise à jour OTA
    needs: [changes, mobile]
    if: |
      github.event_name == 'push' &&
      needs.changes.outputs.mobile == 'true' &&
      needs.mobile.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/mobile/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: apps/mobile
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Publier sur Expo
        working-directory: apps/mobile
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          BRANCH="preview"
          [ "$REF_NAME" = "main" ] && BRANCH="production"
          eas update --branch "$BRANCH" --message "$COMMIT_MSG" --non-interactive
