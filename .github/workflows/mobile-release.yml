name: Mobile Release (build natif)

# Déclenchement MANUEL uniquement (workflow_dispatch) — contrairement à
# eas-update (ci.yml, automatique sur push), un build natif consomme des
# crédits EAS et peut déclencher plusieurs jours de review App
# Store/Play Store si soumis. On ne veut jamais ça déclenché automatiquement
# par un simple push.
#
# `eas submit` n'est PAS inclus ici : apps/mobile/eas.json a encore des
# identifiants placeholder (ascAppId, appleTeamId, google-service-account.json
# "XXXXXXXXXX") — tant que ces vrais identifiants ne sont pas configurés, la
# soumission automatique échouerait. À ajouter séparément une fois prêt.

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Plateforme à builder"
        type: choice
        options: [android, ios, all]
        default: all
      profile:
        description: "Profil EAS (voir apps/mobile/eas.json)"
        type: choice
        options: [production, preview]
        default: production

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/mobile/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: apps/mobile
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: EAS Build
        working-directory: apps/mobile
        # --no-wait : le build continue sur l'infra Expo, pas la peine de
        # bloquer un runner GitHub pendant potentiellement 20-30 min. Suivre
        # la progression sur expo.dev ou via `eas build:list`.
        run: eas build --platform ${{ inputs.platform }} --profile ${{ inputs.profile }} --non-interactive --no-wait
