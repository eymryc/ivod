# =============================================================================
# CD — Déploiement continu iVOD
#
# Workflow réutilisable, appelé par le job « deploy » de ci.yml.
# Transfère le code sur le VPS puis rebuild la stack Docker.
# =============================================================================

name: Deploy

on:
  workflow_call:

jobs:
  deploy:
    name: Rsync & rebuild
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configurer SSH
        env:
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${PROD_SSH_KEY}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${PROD_PORT:-22}" -H "${PROD_HOST}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Transférer le code (rsync)
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_APP_DIR: ${{ secrets.PROD_APP_DIR }}
          SSH_KEY_FILE: ~/.ssh/deploy_key
        run: ./scripts/rsync-to-server.sh

      - name: Rebuild Docker
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_PORT }}
          script: |
            cd ${{ secrets.PROD_APP_DIR }}
            ./deploy.sh
