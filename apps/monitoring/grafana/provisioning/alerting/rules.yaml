apiVersion: 1

groups:
  - orgId: 1
    name: infra-ressources
    folder: iVOD
    interval: 1m
    rules:
      - uid: ivod-disk-usage-high
        title: "Disque > 85% sur le serveur"
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus-ds
            model:
              editorMode: code
              expr: '100 - ((node_filesystem_avail_bytes{mountpoint="/",fstype!="tmpfs"} * 100) / node_filesystem_size_bytes{mountpoint="/",fstype!="tmpfs"})'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [85]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: ["B"]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: threshold
        noDataState: NoData
        execErrState: Error
        for: 5m
        annotations:
          summary: "Le disque du serveur iVOD dépasse 85% d'utilisation — vérifier apps/api/logs, apps/api/backups et les volumes Docker (postgres_data/minio_data)"
        labels:
          severity: warning

      - uid: ivod-ram-usage-high
        title: "RAM > 90% sur le serveur"
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus-ds
            model:
              editorMode: code
              expr: '100 - ((node_memory_MemAvailable_bytes * 100) / node_memory_MemTotal_bytes)'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [90]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: ["B"]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: threshold
        noDataState: NoData
        execErrState: Error
        for: 5m
        annotations:
          summary: "La RAM du serveur iVOD dépasse 90% d'utilisation — vérifier les jobs ffmpeg concurrents (docker stats) et le nombre de replicas API"
        labels:
          severity: warning
