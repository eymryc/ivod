server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: ivod-docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: name
            values:
              # Filtre Docker = substring, pas exact — "ivod-api-prod" ne
              # matchait ni ivod-api-1-prod ni ivod-api-2-prod (les 2 réplicas
              # réels). Résultat : zéro log API dans Loki. Trouvé le 2026-07-08.
              - ivod-api-1-prod
              - ivod-api-2-prod
              - ivod-video-worker-prod
              - ivod-web-prod
              - ivod-nginx-prod
              - ivod-postgres-prod
              - ivod-redis-prod
              - ivod-minio-prod
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: /(.*)
        target_label: container
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service
      - source_labels: [__meta_docker_container_label_com_docker_compose_project]
        target_label: project
    pipeline_stages:
      - json:
          expressions:
            level: level
            message: message
            context: context
      - labels:
          level:
