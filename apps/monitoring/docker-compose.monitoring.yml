# =============================================================================
# iVOD — Stack monitoring (Uptime Kuma + Loki + Promtail + Grafana)
#
# Prérequis : être sur le même hôte que le stack prod (réseau ivod-prod).
#
# Démarrage :
#   docker compose -f apps/monitoring/docker-compose.monitoring.yml up -d
#
# Accès (derrière Nginx/VPN — ne pas exposer directement sur internet) :
#   Uptime Kuma  → http://localhost:3002
#   Grafana      → http://localhost:3003   admin / voir GRAFANA_PASSWORD
#
# Ports non exposés publiquement : configurer Nginx ou un tunnel SSH si besoin.
# =============================================================================

services:

  # ─── Uptime Kuma — health checks HTTP/TCP ────────────────────────────────────
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: ivod-uptime-kuma
    volumes:
      - uptime_kuma_data:/app/data
    ports:
      - "127.0.0.1:3002:3001"
    restart: unless-stopped
    networks:
      - ivod-prod
      - monitoring
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Loki — agrégateur de logs ───────────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.10
    container_name: ivod-loki
    ports:
      - "127.0.0.1:3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
      - ./loki-config.yaml:/etc/loki/local-config.yaml:ro
    restart: unless-stopped
    networks:
      - monitoring
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Promtail — collecteur de logs Docker ────────────────────────────────────
  promtail:
    image: grafana/promtail:2.9.10
    container_name: ivod-promtail
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./promtail-config.yaml:/etc/promtail/config.yaml:ro
    command: -config.file=/etc/promtail/config.yaml
    restart: unless-stopped
    networks:
      - monitoring
    depends_on:
      - loki
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Grafana — dashboards ─────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.2.0
    container_name: ivod-grafana
    ports:
      - "127.0.0.1:3003:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-changeme_in_production}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3003}
      GF_ANALYTICS_REPORTING_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    restart: unless-stopped
    networks:
      - monitoring
    depends_on:
      - loki
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  uptime_kuma_data:
  loki_data:
  grafana_data:

networks:
  ivod-prod:
    external: true
  monitoring:
    driver: bridge
