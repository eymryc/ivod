# =============================================================================
# iVOD — Config Prometheus (métriques système + par conteneur)
#
# Scrape node-exporter (CPU/RAM/disque de l'hôte) et cAdvisor (par conteneur
# Docker) — alimente les dashboards + alertes Grafana (voir grafana/provisioning/alerting).
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  # Nécessite que prometheus rejoigne le réseau ivod-prod (voir
  # docker-compose.monitoring.yml) — api_1/api_2 n'ont pas de port publié
  # sur l'hôte, seul un conteneur du même réseau Docker peut les atteindre.
  - job_name: ivod-api
    metrics_path: /api/v1/metrics
    static_configs:
      - targets: ["ivod-api-1-prod:3000", "ivod-api-2-prod:3000"]
        labels:
          service: ivod-api
