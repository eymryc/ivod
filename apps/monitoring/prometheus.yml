# =============================================================================
# iVOD — Config Prometheus (métriques système + par conteneur)
#
# Scrape node-exporter (CPU/RAM/disque de l'hôte) et cAdvisor (par conteneur
# Docker) — alimente les dashboards + alertes Grafana (voir grafana/provisioning/alerting).
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]
