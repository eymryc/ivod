# =============================================================================
# iVOD — Nginx reverse proxy (production / préprod xselcloud)
#
# Domaine unique (pas de sous-domaine api./www. — routage par chemin) :
#   ivod-preprod-srv01.xselcloud.com
#     /              → web (Next.js, service Docker "web")
#     /api/v1, /socket.io/ → API (upstream api_backend, 2 réplicas)
#
# Avant le premier démarrage : voir docs/DEPLOY.md pour la séquence certbot
# complète (bootstrap webroot + placement des certs dans apps/api/nginx/ssl/).
# En résumé :
#   1. Placer les certificats SSL dans apps/api/nginx/ssl/
#      - fullchain.pem   (certificat + chaîne intermédiaire)
#      - privkey.pem     (clé privée)
#   2. Le renouvellement automatique (certbot renew --webroot) réutilise la
#      location /.well-known/acme-challenge/ ci-dessous — aucune coupure Nginx.
# =============================================================================

worker_processes auto;
# Augmente la limite de fichiers ouverts pour les connexions simultanées (ulimit -n)
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout    65;
    keepalive_requests 1000;
    server_tokens   off;

    # Résolution DNS interne Docker (requis pour les upstreams dans les containers)
    resolver 127.0.0.11 valid=30s ipv6=off;

    # ── Compression ──────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml+rss
        application/atom+xml image/svg+xml;

    # ── Rate limiting ─────────────────────────────────────────────────────────
    # Zone dédiée aux routes auth sensibles : 3 req/min par IP (complète le @Throttle NestJS)
    limit_req_zone $binary_remote_addr zone=auth_strict:10m rate=3r/m;
    # Zone API générale
    limit_req_zone $binary_remote_addr zone=api_global:10m  rate=60r/s;
    # Zone web frontend
    limit_req_zone $binary_remote_addr zone=web_global:10m  rate=100r/s;
    # Rejets rate-limit en "notice" pour ne pas polluer error.log en warn
    limit_req_log_level notice;

    # ── WebSocket support ─────────────────────────────────────────────────────
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ── TLS commun (partagé entre les deux vhosts) ────────────────────────────
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ── Upstream pools avec keepalive (réduit l'overhead TCP vers NestJS) ─────
    # Depuis nginx 1.25.1 : http2 est une directive séparée, plus un paramètre listen
    #
    # 2 réplicas API (api_1, api_2 — voir docker-compose.prod.yml) : least_conn
    # envoie la requête à l'instance la moins chargée ; max_fails/fail_timeout
    # est le health check PASSIF de Nginx (pas un vrai health check actif — il
    # ne fait que compter les échecs de requêtes réelles). Si une instance
    # cumule 3 échecs en 10s, Nginx la sort du pool pendant 10s puis retente.
    # Pendant un déploiement (recréation d'api_1 puis api_2 l'un après
    # l'autre), l'instance en cours de recréation refuse les connexions →
    # Nginx bascule immédiatement le trafic sur l'autre instance saine.
    upstream api_backend {
        least_conn;
        server api_1:3000 max_fails=3 fail_timeout=10s;
        server api_2:3000 max_fails=3 fail_timeout=10s;
        keepalive 32;
        keepalive_requests 1000;
        keepalive_timeout  60s;
    }

    upstream web_backend {
        zone web_backend 64k;
        # resolve : re-résout le hostname Docker après recréation du container
        # (sans ça, Nginx garde l'ancienne IP → 502 jusqu'à reload manuel).
        server web:3001 resolve;
        keepalive 16;
        keepalive_requests 500;
        keepalive_timeout  30s;
    }

    # MinIO — requis pour les presigned PUT/GET (upload direct navigateur,
    # voir apps/api/src/common/services/minio.service.ts). Le trafic interne
    # reste en clair (MinIO n'a pas de cert TLS) ; Nginx fait la terminaison
    # HTTPS. Le Host header DOIT être préservé tel quel (proxy_set_header
    # Host $host dans les locations ci-dessous) : la signature SigV4 est
    # calculée côté API sur ce Host exact — un Host différent invaliderait
    # la signature et MinIO rejetterait la requête.
    upstream minio_backend {
        server minio:9000;
        keepalive 16;
    }

    # ── HTTP → HTTPS redirect (+ challenge ACME pour le renouvellement certbot) ──
    server {
        listen 80;
        listen [::]:80;
        server_name ivod-preprod-srv01.xselcloud.com;

        # certbot renew --webroot -w apps/api/certbot-webroot (voir docs/DEPLOY.md)
        # Doit rester en HTTP simple : Let's Encrypt appelle cette URL en clair.
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # =========================================================================
    # ivod-preprod-srv01.xselcloud.com — un seul hostname, routage par chemin
    #   /api/v1, /socket.io/  → API (upstream api_backend, 2 réplicas)
    #   /                     → Web (Next.js)
    # =========================================================================
    server {
        # Depuis nginx 1.25.1 : http2 est une directive distincte, pas un paramètre listen
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name ivod-preprod-srv01.xselcloud.com;

        # Le plus grand des deux besoins (upload vidéo côté API) ; le front
        # (avatars, images bannières) reste largement sous cette limite.
        client_max_body_size 20M;

        # ── En-têtes de sécurité (communs API + Web) ──────────────────────────
        # HSTS : force HTTPS pendant 1 an (includeSubDomains — pas de sous-domaine
        # utilisé ici, mais garde la directive cohérente si un jour on en ajoute)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        # Empêche le MIME-sniffing
        add_header X-Content-Type-Options    "nosniff"                          always;
        # Empêche l'inclusion dans des iframes (clickjacking) — SAMEORIGIN car le
        # même host sert aussi le front (DENY casserait toute iframe interne)
        add_header X-Frame-Options           "SAMEORIGIN"                       always;
        # Contrôle les informations de provenance
        add_header Referrer-Policy           "strict-origin-when-cross-origin"  always;
        # Permissions API : désactive les APIs navigateur non utilisées
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

        # Routes auth sensibles : double rate-limit (Nginx + NestJS Throttler)
        # Taux : 3 req/min, burst 2 sans délai → 429 au-delà
        location ~ ^/api/v1/auth/(send-otp|verify-otp|login|register|forgot-password|reset-password) {
            limit_req        zone=auth_strict burst=2 nodelay;
            limit_req_status 429;

            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            # Keepalive upstream : Connection ne doit pas être "close"
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_read_timeout 30s;
        }

        # WebSocket Socket.io (notifications temps réel)
        location /socket.io/ {
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $connection_upgrade;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # API générale (base path /api/v1 — cf. apps/api/src/main.ts)
        location /api/ {
            limit_req        zone=api_global burst=30 nodelay;
            limit_req_status 429;

            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            # Keepalive upstream : Connection ne doit pas être "close"
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # ── MinIO — presigned PUT/GET (upload direct navigateur) ─────────────
        # Noms de buckets en dur (Nginx ne lit pas apps/api/.env) : DOIVENT
        # correspondre à MINIO_BUCKET_VIDEOS / MINIO_BUCKET_ASSETS. Pas de
        # limit_req ici : ce sont des transferts binaires pré-autorisés par
        # une signature à durée limitée, pas des appels API classiques.
        location /ivod-videos/ {
            client_max_body_size 20G;
            # Ne PAS bufferiser le corps de la requête : un gros upload vidéo
            # serait sinon entièrement écrit sur disque/mémoire par Nginx
            # avant même de commencer à le transmettre à MinIO.
            proxy_request_buffering off;

            proxy_pass         http://minio_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_connect_timeout 10s;
            proxy_read_timeout    600s;
            proxy_send_timeout    600s;
        }

        location /ivod-assets/ {
            client_max_body_size 50M;
            proxy_request_buffering off;

            proxy_pass         http://minio_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_connect_timeout 10s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;
        }

        # Assets Next.js — cache long, burst rate limit plus large
        location /_next/static/ {
            proxy_pass         http://web_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_read_timeout 30s;
            add_header         Cache-Control "public, max-age=31536000, immutable" always;
        }

        # Affiches / vignettes (rewrite Next → API → MinIO)
        location /media {
            limit_req        zone=web_global burst=120 nodelay;
            limit_req_status 429;

            proxy_pass         http://web_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_read_timeout 120s;
        }

        # Web (Next.js) — pages et API routes Next
        location / {
            limit_req        zone=web_global burst=60 nodelay;
            limit_req_status 429;

            proxy_pass         http://web_backend;
            proxy_http_version 1.1;
            # Keepalive upstream
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_read_timeout 60s;
        }
    }
}
