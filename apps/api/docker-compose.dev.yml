# =============================================================================
# IVOD — Environnement de développement
#
# Services Docker :  API + worker vidéo + PostgreSQL + Redis + MinIO + Adminer
# Web Next.js     :  lancé LOCALEMENT → cd apps/web && npm run dev  (port 3001)
#
# Démarrage : make dev-up   (ou docker compose -f apps/api/docker-compose.dev.yml up -d)
# =============================================================================

services:

  # ─── API NestJS ─────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: ivod-api-dev
    # Clés Paystack, SMTP détaillé, etc. — lus depuis apps/api/.env (pas le .env racine)
    env_file:
      - .env
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      # Hostname Docker interne — NE PAS utiliser localhost ici
      DATABASE_URL: postgresql://${POSTGRES_USER:-ivod}:${POSTGRES_PASSWORD:-ivod}@postgres:5432/${POSTGRES_DB:-ivod}?schema=public
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      # Endpoint public utilisé pour générer les presigned URLs (accessible depuis le navigateur)
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-localhost}
      MINIO_PUBLIC_PORT: ${MINIO_PUBLIC_PORT:-9000}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_USE_SSL: "false"
      MINIO_BUCKET_VIDEOS: ${MINIO_BUCKET_VIDEOS:-ivod-videos}
      MINIO_BUCKET_ASSETS: ${MINIO_BUCKET_ASSETS:-ivod-assets}
      # JWT, FRONTEND_URL, CORS, MAIL, Paystack → .env (env_file)
      # Polling chokidar — nécessaire pour que nest --watch détecte les
      # changements de fichiers via les volumes Docker sur macOS/Windows
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "1000"
      IVOD_APP_MODE: api
      # Pipeline vidéo — enqueue seulement (worker séparé)
      VIDEO_TWO_PHASE: ${VIDEO_TWO_PHASE:-true}
      VIDEO_CPU_PARALLEL: ${VIDEO_CPU_PARALLEL:-2}
      VIDEO_JOB_LOCK_MS: ${VIDEO_JOB_LOCK_MS:-14400000}
      VIDEO_JOB_LOCK_RENEW_MS: ${VIDEO_JOB_LOCK_RENEW_MS:-300000}
      VIDEO_DEV_PROFILES: ${VIDEO_DEV_PROFILES:-}
      VIDEO_FAST_MODE: ${VIDEO_FAST_MODE:-false}
      VIDEO_SINGLE_PASS_LADDER: ${VIDEO_SINGLE_PASS_LADDER:-true}
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma
      # Client Prisma généré — monté pour que l'IDE local voie les types sans npm install
      - ./node_modules/.prisma/client:/app/node_modules/.prisma/client
    # ── Docker Compose Watch (v2.22+) ────────────────────────────────────────
    # Alternative au polling CHOKIDAR : Docker pousse les changements directement
    # via fswatch (host) → inotify (container), sans délai de polling.
    # Usage : docker compose -f docker-compose.dev.yml watch
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src
          ignore:
            - "**/*.js.map"
        - action: sync
          path: ./prisma
          target: /app/prisma
        - action: rebuild
          path: ./package.json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - ivod-dev
    restart: unless-stopped

  # ─── Worker transcodage vidéo (BullMQ + ffmpeg) ─────────────────────────────
  # Scale horizontal : docker compose --profile scale up -d → lance video-worker-2 en parallèle
  # Les deux workers partagent la même queue Redis — BullMQ gère la répartition nativement.
  video-worker: &worker-base
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: ivod-video-worker-dev
    environment: &worker-env
      NODE_ENV: development
      IVOD_APP_MODE: worker
      DATABASE_URL: postgresql://${POSTGRES_USER:-ivod}:${POSTGRES_PASSWORD:-ivod}@postgres:5432/${POSTGRES_DB:-ivod}?schema=public
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-localhost}
      MINIO_PUBLIC_PORT: ${MINIO_PUBLIC_PORT:-9000}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_USE_SSL: "false"
      MINIO_BUCKET_VIDEOS: ${MINIO_BUCKET_VIDEOS:-ivod-videos}
      MINIO_BUCKET_ASSETS: ${MINIO_BUCKET_ASSETS:-ivod-assets}
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "1000"
      VIDEO_TWO_PHASE: ${VIDEO_TWO_PHASE:-true}
      VIDEO_CPU_PARALLEL: ${VIDEO_CPU_PARALLEL:-2}
      VIDEO_WORKER_CONCURRENCY: ${VIDEO_WORKER_CONCURRENCY:-2}
      VIDEO_FFMPEG_THREADS: ${VIDEO_FFMPEG_THREADS:-4}
      VIDEO_JOB_LOCK_MS: ${VIDEO_JOB_LOCK_MS:-14400000}
      VIDEO_JOB_LOCK_RENEW_MS: ${VIDEO_JOB_LOCK_RENEW_MS:-300000}
      VIDEO_DEV_PROFILES: ${VIDEO_DEV_PROFILES:-}
      VIDEO_FAST_MODE: ${VIDEO_FAST_MODE:-false}
      VIDEO_SINGLE_PASS_LADDER: ${VIDEO_SINGLE_PASS_LADDER:-true}
      VIDEO_WEBHOOK_URLS: ${VIDEO_WEBHOOK_URLS:-}
      VIDEO_WEBHOOK_SECRET: ${VIDEO_WEBHOOK_SECRET:-}
      # VIDEO_HW_ACCEL=videotoolbox  # Mac hors Docker uniquement
    entrypoint: ["./docker-entrypoint-worker.sh"]
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - ivod-dev
    restart: unless-stopped

  # ─── Worker vidéo secondaire (profil scale, opt-in) ──────────────────────────
  # Activer : docker compose -f apps/api/docker-compose.dev.yml --profile scale up -d
  video-worker-2:
    <<: *worker-base
    container_name: ivod-video-worker-2-dev
    profiles:
      - scale

  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: ivod-postgres-dev
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-ivod}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ivod}
      POSTGRES_DB:       ${POSTGRES_DB:-ivod}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ivod-dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ivod}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:8-alpine
    container_name: ivod-redis-dev
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - ivod-dev
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Adminer (UI base de données) ───────────────────────────────────────────
  adminer:
    image: adminer:latest
    container_name: ivod-adminer-dev
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: pepa-linha-dark
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ivod-dev
    restart: unless-stopped

  # ─── MinIO ───────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: ivod-minio-dev
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - ivod-dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  minio_data:

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  ivod-dev:
    driver: bridge
