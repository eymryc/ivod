# ═══════════════════════════════════════════════════════════════════════════════
# INFRA SERVICES — PostgreSQL · Redis · MinIO
# ═══════════════════════════════════════════════════════════════════════════════
# Utilisé seul  : docker compose up -d
# Utilisé par   : docker compose -f docker-compose.yml -f docker-compose.<env>.yml up
# Ou simplement : make infra | make dev | make staging | make prod
# ───────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    container_name: ivod-postgres
    image: postgres:15-alpine
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-ivod}
      POSTGRES_USER:     ${POSTGRES_USER:-ivod}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required — copy .env.example → .env}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ivod} -d ${POSTGRES_DB:-ivod}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    container_name: ivod-redis
    image: redis:7-alpine
    command: >
      sh -c "redis-server ${REDIS_PASSWORD:+--requirepass $$REDIS_PASSWORD}"
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── MinIO (S3-compatible) ───────────────────────────────────────────────────
  minio:
    container_name: ivod-minio
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
    volumes:
      - minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mc ready local 2>/dev/null || curl -sf http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── MinIO Init (crée le bucket et le rend public) ──────────────────────────
  minio_init:
    container_name: ivod-minio-init
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      mc mb -p local/$$MINIO_BUCKET >/dev/null 2>&1 || true;
      mc anonymous set download local/$$MINIO_BUCKET >/dev/null 2>&1 || true;
      echo 'MinIO bucket [$$MINIO_BUCKET] ready';
      "
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      MINIO_BUCKET:        ${MINIO_BUCKET:-ivod}
    restart: "no"

volumes:
  postgres_data:
  redis_data:
  minio_data:
